{% extends 'base.html' %}
 {% load static %}
{% block title %}Select Profile Type{% endblock %}

 {% block content %}
 <style>
    .profile-image {
        width: 200px;
        height: 200px;
        margin:0 auto;
        border-radius: 50%;
        object-fit: cover;
    }
 </style>


<div class="container-fluid ">

    <h1 class="h3 mb-4 text-gray-800">{{user.username}}'s Profile</h1>

    <div class="row">
        <div class="col-lg-10">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold  text-gray-200">Update Your Profile</h6>
                </div>
                <div class="card-body align-items-center">
                    <form method="post" enctype="multipart/form-data" novalidate>
                        {% csrf_token %}
                        
                        <div class="form-group align-items-center">
                            <label for="profile_image">Profile Image</label>
                            <div class="mb-3">
                                {% if user_profile.profile_image %}
                                    <img id="previewImage" src="{{ user_profile.profile_image.url }}" alt="Profile Image" class="img-thumbnail" style="max-width: 200px; max-height: 200px;">
                                {% else %}
                                    <img id="previewImage"  src="{% static 'img/user.jpg' %}"  alt=" Default profile image" class="img-thumbnail" style="max-width: 200px; max-height: 200px;">
                                {% endif %}
                            </div>
                            <input type="file" class="form-control-file" id="profile_image" name="profile_image" onchange="previewFile()">
                        </div>

                        <div class="form-group">
                            <label for="profile_type">Profile Type</label>
                            <select class="form-control" id="profile_type" name="profile_type">
                                {% for type in profile_types %}
                                    <option value="{{ type.value }}" {% if user_profile.profile_type == type.value %}selected{% endif %}>
                                        {{ type.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="email">Email address</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user_profile.email }}">
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="text" class="form-control" id="phone" name="phone" value="{{ user_profile.phone }}">
                        </div>

                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" class="form-control" id="city" name="city" value="{{ user_profile.city }}">
                        </div>

                        <div class="form-group">
                            <label for="date_of_birth">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ user_profile.date_of_birth|date:'Y-m-d' }}">
                        </div>

                        

                        <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
function previewFile() {
    const preview = document.getElementById('previewImage');
    const file = document.getElementById('profile_image').files[0];
    const reader = new FileReader();

    reader.addEventListener("load", function () {
        preview.src = reader.result;
    }, false);

    if (file) {
        reader.readAsDataURL(file);
    }
}
</script>
{% endblock %}
