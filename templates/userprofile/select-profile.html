{% extends 'base.html' %}
 {% load static %}
{% block title %}Select Profile Type{% endblock %}

{% block content %}

<div class="container mt-4">
    <h5>Select Profile Type</h5>
    <form action="{% url 'select_profile_type' %}" method="post">
        {% csrf_token %}
        <div class="form-group">    
            <label for="profile_type">Profile Type</label>
            <select class="form-control" name="profile_type" id="profile_type">
                {% for profile_type in profile_types %}
                    <option value="{{ profile_type.name }}" {% if profile_type.name == user_profile.profile_type %}selected{% endif %}>{{ profile_type.name }}</option>
                {% endfor %}
            </select>   
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'select_profile_type' %}" class="btn btn-secondary">Cancel</a>

        </div>
    </form>
</div>  
{% endblock %}
