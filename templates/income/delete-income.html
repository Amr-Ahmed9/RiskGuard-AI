{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Delete Income</h5>
                    <p>Are you sure you want to delete this income?</p>


                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'income_index' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>  
        </div>
    </div>
</div>
{% endblock %}
