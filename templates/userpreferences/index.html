{% extends 'base.html' %}
 {% load static %}
{% block title %}User Preferences{% endblock %}

{% block content %}

<div class="container mt-4">
    <h5>Preferred Currency</h5>
    <form action="{% url 'userpreferences' %}" method="post">
        {% csrf_token %}
        <div class="form-group">    
            <label for="currency">Currency</label>
            <select class="form-control" name="currency" id="currency">
                {% for currency in currencies %}
                    <option value="{{ currency.name }}" {% if currency.name == user_preference.currency %}selected{% endif %}>{{ currency.name }}</option>
                {% endfor %}
            </select>   
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'userpreferences' %}" class="btn btn-secondary">Cancel</a>

        </div>
    </form>
</div>  
{% endblock %}
