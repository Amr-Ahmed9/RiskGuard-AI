{% autoescape off %}
Hi {{ user.get_username }},
 
<h2>You requested a password reset.</h2>
<hr>
<h2>Password Reset Link</h2>
{% if reset_url %}
    <p>Here is your reset link: <a href="{{ reset_url }}">{{ reset_url }}</a></p>
{% else %}
    <p>{{ error }}</p>
{% endif %}
Thanks!
{% endautoescape %}
