{% extends 'baseauth.html' %}
{% block title %}
    <title>Login</title>
{% endblock %}
    {% block form %}
    <div class="container">
  
      <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="w-100" style="max-width: 500px;">
          <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-5">
  
              <div class="text-center">
                <h1 class="h4 text-gray-900 mb-4">Welcome Back!</h1>
              </div>
  
              <form class="user" method="POST">
                {% csrf_token %}
                <div class="form-group">
                  {{Lform.username}}
                </div>
                <div class="form-group">
                  {{Lform.password}}
                </div>
                <div class="form-group">
                  <div class="custom-control custom-checkbox small">
                    <input type="checkbox" class="custom-control-input" id="customCheck">
                    <label class="custom-control-label text-gray-900" for="customCheck">Remember Me</label>
                  </div>
                </div>
                    <div class= "errormess text-danger">
                      
                    </div>
                <button type="submit" class="btn btn-primary btn-user btn-block">
                  Login
                </button>
                <hr>
                
              </form>
                   
              <hr>
              <div class="text-center">
                <a class="small" href="{% url 'reset_password' %}">Forgot Password?</a>
              </div>
              <div class="text-center">
                <a class="small" href="{% url 'register' %}">Create an Account!</a>
              </div>
  
            </div>
          </div>
        </div>
      </div>
  
    </div>
  {% endblock form %}
  
{% comment %} 
    <!-- Bootstrap core JavaScript-->
    <script src="{% static 'mvendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'mvendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <!-- Core plugin JavaScript-->
    <script src="{% static 'mvendor/jquery-easing/jquery.easing.min.js' %}"></script>
    {% comment %} <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SimpleLightbox plugin JS-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/SimpleLightbox/2.1.0/simpleLightbox.min.js"></script>
    <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
    <!-- Custom scripts for all pages-->
    
    <script src="{% static 'mjs/sb-admin-2.js' %}"></script>
    <script src="{% static 'mjs/scripts.js' %}"></script>
</body>

</html> {% endcomment %}
