{% extends 'baseauth.html' %}
{% load static %}
{% block title %}
<title>Reset Your Password</title>
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'mcss/authreset.css' %}">
{% endblock %}

{% block form %}

  
 
<body class="bg-gradient-primary">
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="max-width: 500px; width: 100%;">
      <h3 class="text-center text-gray-900 mb-3">Reset Your Password</h3>
      <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary btn-block mt-3">Reset Password</button>
      </form>
    </div>
  </div>
</body>
{% endblock form %}
