{% extends 'base.html' %}
{% block content %}
    <div class="container-fluid">
<div class="card shadow mb-4">

    <div class="card-header py-3">
        <h6 class="m-0 font-weight-bold text-gray-200">put your saving goal here</h6>
    </div>

    <div class="card-body">
        <form method="post" action="{% url 'create_target' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="target_amount">Target Amount</label>
                {{ form.amount }}
            
            </div>
            
            <div class="form-group">
                <label for="start_date">Start Date</label>
                {{ form.start_date }}
            </div>
           
            <div class="form-group">
                <label for="end_date">End Date</label>
                {{ form.end_date }}
            </div>
            <div class="form-group">
                <label for="period">Period</label>
                {{ form.period }}
            </div>
            <button type="submit" name="set_target" class="btn btn-primary">Save Target</button>
        </form>
      
    </div>
</div>
</div>
{% endblock %}
